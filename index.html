<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asteroid Shooter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="hud">
    <span>SCORE: <b id="score">0</b></span>
    <span>LIVES: <b id="lives">♥♥♥</b></span>
    <span>LEVEL: <b id="level">1</b></span>
    <span>BEST: <b id="best">0</b></span>
  </div>
  <canvas id="game"></canvas>
  <div id="overlay" class="show">
    <h1>ASTEROIDS</h1>
    <p>Destroy all asteroids to advance</p>
    <button id="start-btn">PLAY</button>
  </div>
  <script src="src/constants.js"></script>
  <script src="src/utils.js"></script>
  <script src="src/particle.js"></script>
  <script src="src/bullet.js"></script>
  <script src="src/asteroid.js"></script>
  <script src="src/ship.js"></script>
  <script src="src/powerup.js"></script>
  <script src="src/game.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
